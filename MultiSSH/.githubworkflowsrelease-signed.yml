name: Build and Release (Code Signed)

# This workflow is for creating code-signed releases
# Requires Apple Developer certificates to be configured in GitHub Secrets

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build and Release (Signed)
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Import certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
      
      - name: Build for Release
        run: |
          xcodebuild clean build \
            -scheme MultiSSH \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}"
      
      - name: Locate built app
        id: locate_app
        run: |
          APP_PATH=$(find ./DerivedData -name "MultiSSH.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
      
      - name: Codesign verification
        run: |
          codesign -dvv "${{ steps.locate_app.outputs.APP_PATH }}"
          codesign --verify --deep --strict "${{ steps.locate_app.outputs.APP_PATH }}"
      
      - name: Notarize app (optional)
        if: secrets.NOTARIZATION_USERNAME != ''
        run: |
          # Create a ZIP for notarization
          ditto -c -k --keepParent "${{ steps.locate_app.outputs.APP_PATH }}" notarization.zip
          
          # Submit for notarization
          xcrun notarytool submit notarization.zip \
            --apple-id "${{ secrets.NOTARIZATION_USERNAME }}" \
            --password "${{ secrets.NOTARIZATION_PASSWORD }}" \
            --team-id "${{ secrets.DEVELOPMENT_TEAM }}" \
            --wait
          
          # Staple the notarization ticket
          xcrun stapler staple "${{ steps.locate_app.outputs.APP_PATH }}"
      
      - name: Create DMG
        id: create_dmg
        run: |
          mkdir -p ./dmg_temp
          cp -R "${{ steps.locate_app.outputs.APP_PATH }}" ./dmg_temp/
          
          hdiutil create -volname "MultiSSH" \
            -srcfolder ./dmg_temp \
            -ov -format UDZO \
            MultiSSH-${{ inputs.version }}-signed.dmg
          
          echo "DMG_PATH=MultiSSH-${{ inputs.version }}-signed.dmg" >> $GITHUB_OUTPUT
      
      - name: Sign DMG
        run: |
          codesign --sign "${{ secrets.CODE_SIGN_IDENTITY }}" \
            --deep MultiSSH-${{ inputs.version }}-signed.dmg
      
      - name: Create ZIP archive
        id: create_zip
        run: |
          cd ./dmg_temp
          zip -r ../MultiSSH-${{ inputs.version }}-signed.zip MultiSSH.app
          cd ..
          echo "ZIP_PATH=MultiSSH-${{ inputs.version }}-signed.zip" >> $GITHUB_OUTPUT
      
      - name: Generate checksums
        run: |
          shasum -a 256 MultiSSH-${{ inputs.version }}-signed.dmg > checksums.txt
          shasum -a 256 MultiSSH-${{ inputs.version }}-signed.zip >> checksums.txt
          cat checksums.txt
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: MultiSSH v${{ inputs.version }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          body: |
            # MultiSSH v${{ inputs.version }} (Code Signed)
            
            ## Installation
            
            ### Option 1: DMG (Recommended)
            1. Download `MultiSSH-${{ inputs.version }}-signed.dmg`
            2. Open the DMG file
            3. Drag MultiSSH.app to your Applications folder
            
            ### Option 2: ZIP
            1. Download `MultiSSH-${{ inputs.version }}-signed.zip`
            2. Extract the ZIP file
            3. Move MultiSSH.app to your Applications folder
            
            ## Features
            ✅ Code signed by Apple Developer certificate
            ✅ Notarized by Apple (if configured)
            
            ## Requirements
            - macOS 14.0 or later
            
            ## Checksums
            See `checksums.txt` for SHA-256 checksums of the release files.
          files: |
            MultiSSH-${{ inputs.version }}-signed.dmg
            MultiSSH-${{ inputs.version }}-signed.zip
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
