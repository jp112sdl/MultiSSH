name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build and Release
    runs-on: macos-14
    permissions:
        contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Display Xcode version
        run: xcodebuild -version
      
      - name: Build for Release
        run: |
          xcodebuild clean build \
            -scheme MultiSSH \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Locate built app
        id: locate_app
        run: |
          APP_PATH=$(find ./DerivedData -name "MultiSSH.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          
      - name: Create DMG
        id: create_dmg
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p ./dmg_temp
          
          # Copy the app to the temporary directory
          cp -R "${{ steps.locate_app.outputs.APP_PATH }}" ./dmg_temp/
          
          # Create the DMG
          hdiutil create -volname "MultiSSH" \
            -srcfolder ./dmg_temp \
            -ov -format UDZO \
            MultiSSH-${{ inputs.version }}.dmg
          
          echo "DMG_PATH=MultiSSH-${{ inputs.version }}.dmg" >> $GITHUB_OUTPUT
      
      - name: Create ZIP archive
        id: create_zip
        run: |
          cd ./dmg_temp
          zip -r ../MultiSSH-${{ inputs.version }}.zip MultiSSH.app
          cd ..
          echo "ZIP_PATH=MultiSSH-${{ inputs.version }}.zip" >> $GITHUB_OUTPUT
      
      - name: Generate checksums
        run: |
          shasum -a 256 MultiSSH-${{ inputs.version }}.dmg > checksums.txt
          shasum -a 256 MultiSSH-${{ inputs.version }}.zip >> checksums.txt
          cat checksums.txt
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: MultiSSH v${{ inputs.version }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          body: |
            # MultiSSH v${{ inputs.version }}
            
            ## Installation
            
            ### Option 1: DMG (Recommended)
            1. Download `MultiSSH-${{ inputs.version }}.dmg`
            2. Open the DMG file
            3. Drag MultiSSH.app to your Applications folder
            
            ### Option 2: ZIP
            1. Download `MultiSSH-${{ inputs.version }}.zip`
            2. Extract the ZIP file
            3. Move MultiSSH.app to your Applications folder
            
            ## First Launch
            
            Since this app is not code-signed, you'll need to allow it to run:
            1. Right-click (or Control-click) on MultiSSH.app
            2. Select "Open" from the context menu
            3. Click "Open" in the security dialog
            
            Alternatively, you can run this command in Terminal:
            ```bash
            xattr -cr /Applications/MultiSSH.app
            ```
            
            ## Requirements
            - macOS 14.0 or later
            
            ## Checksums
            See `checksums.txt` for SHA-256 checksums of the release files.
          files: |
            MultiSSH-${{ inputs.version }}.dmg
            MultiSSH-${{ inputs.version }}.zip
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
